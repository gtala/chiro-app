# Solo backend + Mosquitto (Oracle VM)
# Uso: docker compose -f docker-compose.prod.yml up -d --build

services:
  certs:
    image: alpine/openssl:latest
    container_name: chiro-certs
    volumes:
      - ./mosquitto/certs:/certs
      - ./scripts/generate-certs.sh:/generate-certs.sh:ro
    entrypoint: ["/bin/sh", "/generate-certs.sh", "/certs"]

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: chiro-mosquitto
    depends_on:
      certs:
        condition: service_completed_successfully
    ports:
      - "8883:8883"
      - "8084:8084"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/certs:/mosquitto/certs:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: chiro-backend
    depends_on:
      - mosquitto
    env_file:
      - ./backend/.env
    environment:
      MQTT_HOST: mosquitto
      MQTT_CA_PATH: /certs/ca.crt
      MQTT_TLS_INSECURE: "true"
      API_HOST: 0.0.0.0
      API_PORT: 3000
    volumes:
      - ./mosquitto/certs/ca.crt:/certs/ca.crt:ro
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
