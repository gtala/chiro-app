services:
  certs:
    image: alpine/openssl:latest
    container_name: chiro-certs
    volumes:
      - ./mosquitto/certs:/certs
      - ./scripts/generate-certs.sh:/generate-certs.sh:ro
    entrypoint: ["/bin/sh", "/generate-certs.sh", "/certs"]

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: chiro-mosquitto
    depends_on:
      certs:
        condition: service_completed_successfully
    ports:
      - "8883:8883"
      - "8084:8084"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/certs:/mosquitto/certs:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -p 8883 --cafile /mosquitto/certs/ca.crt -t '$$SYS/broker/version' -C 1 -W 3"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build: ./backend
    container_name: chiro-backend
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 3000
      MQTT_HOST: mosquitto
      MQTT_PORT: 8883
      MQTT_USERNAME: ""
      MQTT_PASSWORD: ""
      DB_MONGO_USERNAME: chirox
      DB_MONGO_PASSWORD: emjF9yFch6edQ4C0
      DB_MONGO_DBNAME: chiro
      DB_MONGO_HOST: kokteyl-card.ey4ki.mongodb.net
      DB_MONGO_PORT: ""
      ENVIRONMENT: dev
      MQTT_TLS_INSECURE: "true"
      MQTT_CA_PATH: /certs/ca.crt
    volumes:
      - ./mosquitto/certs/ca.crt:/certs/ca.crt:ro
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/status').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_HOST_URL: http://localhost:3000/
    container_name: chiro-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3005:3000"
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
